# ====== 启航平台 Nginx 配置（宝塔面板使用）======
# 使用方法：在宝塔面板「网站」→「设置」→「配置文件」中替换内容
# 注意：将 your-domain.com 替换为你的真实域名

server {
    listen 80;
    server_name your-domain.com;

    # 如果需要 HTTPS，宝塔面板可以一键申请 SSL 证书
    # 申请后会自动生成 443 监听和跳转配置

    # 前端静态文件（Vite 构建产物）
    root /www/wwwroot/qihang-platform/frontend/dist;
    index index.html;

    # Gzip 压缩
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;

    # 静态资源长缓存（Vite 构建的文件名含 hash）
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # API 反向代理到 Node.js 后端
    location /api/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_read_timeout 120s;
        proxy_send_timeout 60s;

        # 文件上传大小限制
        client_max_body_size 15m;
    }

    # 上传文件代理
    location /uploads/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        expires 7d;
    }

    # SPA 路由 fallback（所有前端路由都返回 index.html）
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 禁止访问隐藏文件
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # 错误页面
    error_page 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
        internal;
    }

    access_log /www/wwwlogs/qihang-platform.log;
    error_log /www/wwwlogs/qihang-platform.error.log;
}
